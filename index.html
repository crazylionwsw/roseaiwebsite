<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RoseAI</title>
    <meta name="description" content="RoseAI AI phone receptionist for restaurants.">
    <meta name="robots" content="noindex, follow">
    <link rel="icon" type="image/svg+xml" href="assets/favicon.svg">
    <link rel="stylesheet" href="assets/css/site.css">
    <script>
        (function () {
            var preferredLanguage = navigator.languages && navigator.languages.length
                ? navigator.languages[0]
                : (navigator.language || navigator.userLanguage || "");
            var isChinese = /^zh\b/i.test(preferredLanguage);
            window.location.replace(isChinese ? "zh/" : "en/");
        })();
    </script>
    <noscript>
        <meta http-equiv="refresh" content="0; url=en/">
    </noscript>
</head>
<body class="redirect-page">
    <main>
        <h1>RoseAI</h1>
        <p>Redirecting to your language version...</p>
        <p><a href="en/">English</a> · <a href="zh/">中文</a></p>
    </main>
</body>
</html>
