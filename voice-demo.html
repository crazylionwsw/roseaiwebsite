<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RoseAI Voice Demo</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;700&family=Noto+Serif+SC:wght@600;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --dark-ink: #09251A;
            --darker: #051a12;
            --card-bg: #0c2e21;
            --primary-green: #086B31;
            --primary-green-bright: #0d9647;
            --accent-red: #E8241B;
            --cream: #FFFDF7;
            --muted: rgba(255,253,247,0.65);
            --glass: rgba(255,255,255,0.04);
            --border: rgba(255,255,255,0.08);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Noto Sans SC', sans-serif;
            background: var(--dark-ink);
            color: var(--cream);
            min-height: 100vh;
            display: grid;
            place-items: center;
            padding: 20px;
        }

        .demo-wrap {
            width: 100%;
            max-width: 900px;
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 40px;
            align-items: center;
        }

        @media (max-width: 768px) {
            .demo-wrap { grid-template-columns: 1fr; gap: 24px; }
        }

        /* === Phone Mockup === */
        .phone-mockup {
            position: relative;
            max-width: 360px;
            margin: 0 auto;
            background: linear-gradient(145deg, #1a3d2c, #0c2e21);
            border-radius: 36px;
            padding: 18px 14px;
            box-shadow: 0 30px 60px rgba(0,0,0,0.5), 0 0 0 1px var(--border), inset 0 1px 0 rgba(255,255,255,0.08);
        }
        .phone-screen {
            background: var(--darker);
            border-radius: 22px;
            padding: 20px 16px;
            min-height: 520px;
            display: flex;
            flex-direction: column;
        }
        .phone-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 11px;
            color: var(--muted);
            padding-bottom: 12px;
            margin-bottom: 12px;
            border-bottom: 1px solid var(--border);
        }
        .phone-header .caller {
            color: var(--cream);
            font-weight: 600;
            font-size: 14px;
        }
        .phone-header .live {
            display: inline-flex;
            align-items: center;
            gap: 5px;
            color: var(--primary-green-bright);
            font-weight: 600;
        }
        .phone-header .live::before {
            content: '';
            width: 7px; height: 7px;
            border-radius: 50%;
            background: var(--primary-green-bright);
            animation: pulse 1.5s infinite;
        }
        @keyframes pulse {
            0%,100% { opacity: 1; transform: scale(1); }
            50% { opacity: 0.4; transform: scale(1.5); }
        }

        .transcript {
            flex: 1;
            overflow-y: auto;
            padding-right: 6px;
            margin-bottom: 12px;
            display: flex;
            flex-direction: column;
            gap: 8px;
            max-height: 380px;
        }
        .transcript::-webkit-scrollbar { width: 3px; }
        .transcript::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

        .bubble {
            padding: 10px 14px;
            border-radius: 14px;
            font-size: 13px;
            line-height: 1.5;
            max-width: 82%;
            animation: bubbleIn 0.4s ease both;
            word-break: break-word;
        }
        .bubble.ai {
            background: rgba(13,150,71,0.15);
            border: 1px solid rgba(13,150,71,0.25);
            color: var(--cream);
            border-bottom-left-radius: 4px;
            align-self: flex-start;
        }
        .bubble.user {
            background: rgba(255,255,255,0.06);
            color: var(--muted);
            border-bottom-right-radius: 4px;
            align-self: flex-end;
        }
        .bubble.system {
            background: rgba(232,36,27,0.08);
            border: 1px solid rgba(232,36,27,0.2);
            color: rgba(255,140,130,0.9);
            border-radius: 8px;
            align-self: center;
            font-size: 11px;
            max-width: 90%;
            text-align: center;
        }
        @keyframes bubbleIn {
            from { opacity: 0; transform: translateY(6px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .phone-actions {
            display: flex;
            gap: 10px;
            justify-content: center;
            padding-top: 10px;
            border-top: 1px solid var(--border);
        }
        .phone-btn {
            width: 48px; height: 48px;
            border-radius: 50%;
            border: none;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            font-size: 18px;
            transition: all 0.25s ease;
        }
        .btn-speak {
            background: var(--primary-green-bright);
            color: white;
            box-shadow: 0 6px 20px rgba(13,150,71,0.4);
        }
        .btn-speak:hover { background: var(--primary-green); transform: scale(1.08); }
        .btn-speak.listening {
            background: var(--accent-red);
            animation: pulse 1.5s infinite;
            box-shadow: 0 6px 20px rgba(232,36,27,0.5);
        }
        .btn-speak:disabled {
            background: #555;
            box-shadow: none;
            cursor: not-allowed;
            animation: none;
        }
        .btn-reset {
            background: transparent;
            border: 1px solid var(--border);
            color: var(--muted);
        }
        .btn-reset:hover { border-color: var(--muted); color: var(--cream); }

        /* === Info Panel === */
        .info-panel h1 {
            font-family: 'Noto Serif SC', serif;
            font-size: 32px;
            margin-bottom: 8px;
        }
        .info-panel h1 em { color: var(--accent-red); font-style: normal; }
        .info-panel .subtitle {
            color: var(--muted);
            font-size: 14px;
            margin-bottom: 28px;
            line-height: 1.6;
        }
        .info-panel .status {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 20px;
            padding: 10px 16px;
            border-radius: 10px;
            font-size: 13px;
            font-weight: 600;
        }
        .status.ready { background: rgba(13,150,71,0.1); color: var(--primary-green-bright); border: 1px solid rgba(13,150,71,0.3); }
        .status.error { background: rgba(232,36,27,0.1); color: #ff8a82; border: 1px solid rgba(232,36,27,0.3); }

        .info-panel .lang-indicator {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            background: var(--glass);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 8px 14px;
            font-size: 13px;
            margin-bottom: 20px;
        }
        .info-panel .lang-indicator span { font-weight: 700; color: var(--primary-green-bright); }

        .topic-chips {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin-bottom: 24px;
        }
        .chip {
            font-size: 12px;
            padding: 6px 14px;
            border-radius: 50px;
            border: 1px solid var(--border);
            background: transparent;
            color: var(--muted);
            cursor: pointer;
            transition: all 0.2s ease;
            font-family: inherit;
        }
        .chip:hover { border-color: var(--primary-green-bright); color: var(--cream); }

        .call-log {
            margin-top: 20px;
        }
        .call-log h3 {
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: var(--muted);
            margin-bottom: 12px;
        }
        .call-log .log-item {
            font-size: 12px;
            color: var(--muted);
            padding: 6px 0;
            border-bottom: 1px solid var(--border);
            display: flex;
            justify-content: space-between;
        }
        .log-item .log-lang {
            color: var(--primary-green-bright);
            font-weight: 600;
            min-width: 24px;
        }
    </style>
</head>
<body>

<div class="demo-wrap">
    <!-- Phone Mockup -->
    <div class="phone-mockup">
        <div class="phone-screen">
            <div class="phone-header">
                <div>
                    <div class="caller">RoseAI Voice Demo</div>
                    <div style="font-size:10px;margin-top:2px;" id="callTimer">00:00</div>
                </div>
                <span class="live" id="liveBadge">Ready</span>
            </div>

            <div class="transcript" id="transcript">
                <div class="bubble ai" id="greetingBubble"></div>
            </div>

            <div class="phone-actions">
                <button class="phone-btn btn-reset" onclick="resetDemo()" title="重新开始">
                    <i class="fa-solid fa-rotate-right"></i>
                </button>
                <button class="phone-btn btn-speak" id="speakBtn" onclick="toggleListening()" title="点击说话">
                    <i class="fa-solid fa-microphone"></i>
                </button>
                <button class="phone-btn btn-reset" onclick="toggleMute()" title="静音/取消静音" id="muteBtn">
                    <i class="fa-solid fa-volume-high"></i>
                </button>
            </div>
        </div>
    </div>

    <!-- Info Panel -->
    <div class="info-panel">
        <h1>Rose<em>AI</em> Voice Demo</h1>
        <p class="subtitle">AI 智能语音客服 · 中英文自动切换<br>点击麦克风按钮开始对话</p>

        <div class="status ready" id="statusBox">
            <i class="fa-solid fa-circle-check"></i>
            <span id="statusText">就绪 — 请点击麦克风</span>
        </div>

        <div class="lang-indicator">
            <i class="fa-solid fa-language"></i> 当前语言：<span id="currentLang">—</span>
        </div>

        <p style="font-size:12px;color:var(--muted);margin-bottom:20px;">试试问这些问题：</p>
        <div class="topic-chips">
            <button class="chip" onclick="askText('What is RoseAI?')">What is RoseAI?</button>
            <button class="chip" onclick="askText('RoseAI是什么？')">RoseAI是什么？</button>
            <button class="chip" onclick="askText('多少钱一个月？')">价格多少钱？</button>
            <button class="chip" onclick="askText('How much does it cost?')">Pricing?</button>
            <button class="chip" onclick="askText('支持粤语吗？')">粤语可以吗？</button>
            <button class="chip" onclick="askText('数据安全吗？')">数据安全吗？</button>
            <button class="chip" onclick="askText('Do I need to change my phone number?')">换号吗？</button>
            <button class="chip" onclick="askText('免费试用多久？')">免费试用？</button>
        </div>

        <div class="call-log">
            <h3>对话记录</h3>
            <div id="callLog"><div class="log-item" style="opacity:0.5;">暂无对话记录</div></div>
        </div>
    </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/js/all.min.js"></script>

        },
        {
            en: ['restaurant', 'who is this for', 'type of restaurant', 'small restaurant', 'cafe'],
            zh: ['适合', '什么餐厅', '小餐厅', '中餐馆', '日料', '火锅'],
            answer: {
                en: "RoseAI is built for independent restaurants of all sizes across Canada — from small family-run cafés and bubble tea shops to full-service Cantonese seafood restaurants, Sichuan hot pot spots, Japanese ramen shops, and multi-location chains. If customers call your restaurant to order food, book tables, or ask questions, RoseAI can help. Our customers include Chinese-Canadian restaurants, Korean BBQ spots, Italian trattorias, and Canadian diners.",
                zh: "RoseAI 为加拿大各种规模的独立餐厅设计——从小型家庭咖啡馆、奶茶店，到粤式海鲜酒楼、川菜火锅店、日式拉面馆，再到多店连锁品牌都适用。只要您的客人会打电话来点餐、订座、咨询，RoseAI 就能帮上忙。我们的客户覆盖中餐馆、韩式烧烤、意大利餐厅、加拿大本土餐厅等各种业态。"
            }
        },
        {
            en: ['hello', 'hi', 'hey', 'good morning', 'good afternoon'],
            zh: ['你好', '您好', '喂', '嗨', '早上好', '下午好'],
            answer: {
                en: "Hello! Welcome to RoseAI. I'm the AI voice assistant for Canadian restaurants. I can answer questions about our product, pricing, languages, POS integration, free trial, and more. How can I help you today?",
                zh: "您好！欢迎致电 RoseAI。我是加拿大餐厅 AI 语音助手。我可以回答关于产品功能、价格套餐、语言支持、POS 对接、免费试用等问题。请问有什么可以帮您？"
            }
        },
        {
            en: ['thank', 'thanks', 'bye', 'goodbye'],
            zh: ['谢谢', '多谢', '感谢', '再见', '拜拜'],
            answer: {
                en: "You're welcome! Feel free to visit roseai.ca for more information, or call us at 778-325-4966. Have a great day!",
                zh: "不客气！欢迎访问 roseai.ca 了解更多，或拨打 778-325-4966 联系我们。祝您生意兴隆！"
            }
        }
    ];

    // Default fallback
    var fallbackAnswer = {
        en: "I'm not sure I understood that. You can ask me about RoseAI's pricing, languages, POS integration, free trial, data privacy, or anything about our AI voice receptionist for restaurants. Can you rephrase your question?",
        zh: "抱歉我没有完全理解。您可以问我关于 RoseAI 的价格、语言支持、POS 对接、免费试用、数据安全，或者任何关于我们餐厅 AI 语音接待系统的问题。可以换个方式说一遍吗？"
    };

    function detectLang(text) {
        // Check for Chinese characters
        var chineseRegex = /[一-鿿㐀-䶿]/;
        return chineseRegex.test(text) ? 'zh' : 'en';
    }

    function matchAnswer(userText) {
        var lang = detectLang(userText);
        var lower = userText.toLowerCase().trim();

        var bestMatch = null;
        var bestScore = 0;

        for (var i = 0; i < knowledge.length; i++) {
            var kb = knowledge[i];
            var keywords = lang === 'zh' ? kb.zh : kb.en;

            for (var j = 0; j < keywords.length; j++) {
                var kw = keywords[j].toLowerCase();
                if (lower.indexOf(kw) !== -1) {
                    // Longer keyword match = better
                    var score = kw.length;
                    if (score > bestScore) {
                        bestScore = score;
                        bestMatch = kb;
                    }
                }
            }
        }

        if (bestMatch) {
            return { answer: bestMatch.answer[lang], lang: lang, matched: true };
        }

        // Try cross-language matching: user spoke EN but only ZH keywords match
        if (lang === 'en') {
            for (var i = 0; i < knowledge.length; i++) {
                for (var j = 0; j < knowledge[i].zh.length; j++) {
                    // Romanized/pinyin or partial match against ZH keywords
                    if (lower.indexOf(knowledge[i].zh[j].toLowerCase()) !== -1 ||
                        fuzzyENtoZH(lower, knowledge[i].zh[j])) {
                        return { answer: knowledge[i].answer.en, lang: 'en', matched: true };
                    }
                }
            }
        }

        return { answer: fallbackAnswer[lang], lang: lang, matched: false };
    }

    function fuzzyENtoZH(enText, zhKeyword) {
        // Simple cross-map for common EN queries that match ZH concepts
        var crossMap = {
            'price': '价格', 'cost': '价格', 'how much': '价格', 'pricing': '价格',
            'language': '语言', 'cantonese': '粤语', 'mandarin': '普通话',
            'trial': '试用', 'demo': '试用', 'free trial': '试用',
            'privacy': '隐私', 'data': '数据', 'security': '安全',
            'pos': 'pos', 'toast': 'toast', 'square': 'square',
            'phone number': '换号', 'number': '换号',
            'roi': 'roi', 'save': '省钱', 'return': '回报',
            'cancel': '取消', 'contract': '合同',
            'setup': '安装', 'install': '安装', 'start': '上线',
            'contact': '联系', 'call': '联系', 'reach': '联系',
            'restaurant': '餐厅', 'who is this for': '适合'
        };

        for (var en in crossMap) {
            if (zhKeyword === crossMap[en] && enText.indexOf(en) !== -1) {
                return true;
            }
        }
        return false;
    }

    // ===== UI HELPERS =====
    function addBubble(text, role) {
        var div = document.createElement('div');
        div.className = 'bubble ' + role;
        div.textContent = text;
        transcriptEl.appendChild(div);
        transcriptEl.scrollTop = transcriptEl.scrollHeight;
        return div;
    }

    function addSystemMsg(text) {
        var div = document.createElement('div');
        div.className = 'bubble system';
        div.textContent = text;
        transcriptEl.appendChild(div);
        transcriptEl.scrollTop = transcriptEl.scrollHeight;
    }

    function updateStatus(state, msg) {
        statusBox.className = 'status ' + state;
        statusText.textContent = msg;
    }

    function updateLang(lang) {
        currentLang = lang;
        var label = lang === 'en' ? 'English' : lang === 'zh' ? '中文' : '—';
        currentLangEl.textContent = label;
    }

    function updateLiveBadge(text) {
        liveBadge.textContent = text;
    }

    function addCallLog(text, lang) {
        if (callLogEl.querySelector('.log-item[style]')) {
            callLogEl.innerHTML = '';
        }
        var div = document.createElement('div');
        div.className = 'log-item';
        div.innerHTML = '<span>' + (text.length > 50 ? text.substring(0, 50) + '…' : text) + '</span><span class="log-lang">' + (lang === 'en' ? 'EN' : '中') + '</span>';
        callLogEl.prepend(div);
    }

    function startCallTimer() {
        if (callTimerId) return;
        callActive = true;
        callTimerId = setInterval(function() {
            callSeconds++;
            var m = Math.floor(callSeconds / 60);
            var s = callSeconds % 60;
            callTimerEl.textContent = String(m).padStart(2, '0') + ':' + String(s).padStart(2, '0');
        }, 1000);
    }

    function stopCallTimer() {
        clearInterval(callTimerId);
        callTimerId = null;
    }

    // ===== TTS (Text to Speech) =====
    function speakText(text, lang) {
        var actualLang = lang || detectLang(text);
        speechQueue.push({ text: text, lang: actualLang });
        if (!isSpeaking) processQueue();
    }

    function processQueue() {
        if (speechQueue.length === 0 || isMuted) {
            isSpeaking = false;
            if (speechQueue.length > 0 && isMuted) speechQueue = [];
            return;
        }

        isSpeaking = true;
        var item = speechQueue.shift();
        var utterance = new SpeechSynthesisUtterance(item.text);

        // Map language code
        var langMap = { 'en': 'en-US', 'zh': 'zh-CN' };
        utterance.lang = langMap[item.lang] || 'en-US';
        utterance.rate = 1.0;
        utterance.pitch = 1.0;
        utterance.volume = 1.0;

        // Try to pick a good voice
        var voices = synth.getVoices();
        if (voices.length > 0) {
            var preferredVoice = null;
            // Prefer a natural-sounding voice for the language
            for (var i = 0; i < voices.length; i++) {
                if (item.lang === 'zh' && voices[i].lang.indexOf('zh-CN') !== -1 && voices[i].name.indexOf('Tingting') !== -1) {
                    preferredVoice = voices[i]; break;
                }
                if (item.lang === 'en' && voices[i].lang.indexOf('en-US') !== -1 && voices[i].name.indexOf('Samantha') !== -1) {
                    preferredVoice = voices[i]; break;
                }
                if (!preferredVoice && voices[i].lang.indexOf(langMap[item.lang]) !== -1) {
                    preferredVoice = voices[i];
                }
            }
            if (preferredVoice) utterance.voice = preferredVoice;
        }

        utterance.onend = utterance.onerror = function() {
            processQueue();
        };

        synth.speak(utterance);
    }

    function stopSpeaking() {
        synth.cancel();
        speechQueue = [];
        isSpeaking = false;
    }

    function toggleMute() {
        isMuted = !isMuted;
        var btn = document.getElementById('muteBtn');
        if (isMuted) {
            stopSpeaking();
            btn.innerHTML = '<i class="fa-solid fa-volume-xmark"></i>';
            btn.style.color = 'var(--accent-red)';
        } else {
            btn.innerHTML = '<i class="fa-solid fa-volume-high"></i>';
            btn.style.color = '';
        }
    }

    // ===== SPEECH RECOGNITION =====
    function initRecognition() {
        var SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
        if (!SpeechRecognition) return false;

        if (!recogEN) {
            recogEN = new SpeechRecognition();
            recogEN.lang = 'en-US';
            recogEN.continuous = false;
            recogEN.interimResults = false;
            recogEN.maxAlternatives = 1;
        }

        if (!recogZH) {
            recogZH = new SpeechRecognition();
            recogZH.lang = 'zh-CN';
            recogZH.continuous = false;
            recogZH.interimResults = false;
            recogZH.maxAlternatives = 1;
        }

        return true;
    }

    function startListening() {
        if (isListening) return;
        if (!initRecognition()) {
            updateStatus('error', '浏览器不支持语音识别（请用 Chrome）');
            return;
        }

        isListening = true;
        speakBtn.classList.add('listening');
        speakBtn.querySelector('i').className = 'fa-solid fa-microphone';
        updateStatus('ready', '正在听…');
        updateLiveBadge('Listening');
        speakBtn.disabled = true;
        setTimeout(function() { speakBtn.disabled = false; }, 2000);

        if (!callActive) startCallTimer();

        var bestResult = null;
        var bestConfidence = 0;
        var resolved = false;

        function handleResult(event, lang) {
            if (resolved) return;
            var transcript = event.results[0][0].transcript.trim();
            var confidence = event.results[0][0].confidence;

            if (transcript && (!bestResult || confidence > bestConfidence)) {
                bestResult = transcript;
                bestConfidence = confidence;
            }

            // If we have a good result, resolve
            if (bestResult && bestConfidence > 0.5) {
                resolved = true;
                stopBothRecognitions();
                onSpeechResult(bestResult, lang);
            }
        }

        function handleNoMatch(event, lang) {
            if (resolved) return;
            // If one recognizer got no match and the other hasn't resolved yet, wait longer
            if (bestResult) {
                resolved = true;
                stopBothRecognitions();
                onSpeechResult(bestResult, lang);
            }
        }

        function handleEnd(event, lang) {
            setTimeout(function() {
                if (!resolved) {
                    resolved = true;
                    stopBothRecognitions();
                    if (bestResult) {
                        onSpeechResult(bestResult, lang);
                    } else {
                        onNoSpeech();
                    }
                }
            }, 800);
        }

        recogEN.onresult = function(e) { handleResult(e, 'en'); };
        recogEN.onnomatch = function(e) { handleNoMatch(e, 'en'); };
        recogEN.onend = function(e) { handleEnd(e, 'en'); };
        recogEN.onerror = function(e) {
            if (!resolved && e.error !== 'aborted') {
                handleEnd(e, 'en');
            }
        };

        recogZH.onresult = function(e) { handleResult(e, 'zh'); };
        recogZH.onnomatch = function(e) { handleNoMatch(e, 'zh'); };
        recogZH.onend = function(e) { handleEnd(e, 'zh'); };
        recogZH.onerror = function(e) {
            if (!resolved && e.error !== 'aborted') {
                handleEnd(e, 'zh');
            }
        };

        try {
            recogEN.start();
            recogZH.start();
        } catch (err) {
            // Already started
            stopBothRecognitions();
            isListening = false;
            speakBtn.classList.remove('listening');
            updateStatus('ready', '就绪 — 请点击麦克风');
            updateLiveBadge('Ready');
        }
    }

    function stopBothRecognitions() {
        try { recogEN.abort(); } catch(e) {}
        try { recogZH.abort(); } catch(e) {}
    }

    function stopListening() {
        stopBothRecognitions();
        isListening = false;
        speakBtn.classList.remove('listening');
        speakBtn.querySelector('i').className = 'fa-solid fa-microphone';
    }

    function onSpeechResult(transcript, lang) {
        stopListening();
        addBubble(transcript, 'user');
        addCallLog(transcript, lang);
        updateLang(lang);
        updateStatus('ready', '处理中…');
        updateLiveBadge('Thinking');

        var result = matchAnswer(transcript);

        setTimeout(function() {
            addBubble(result.answer, 'ai');
            updateStatus('ready', '就绪 — 请点击麦克风');
            updateLiveBadge('Ready');
            if (!isMuted) speakText(result.answer, result.lang);
        }, 600);
    }

    function onNoSpeech() {
        stopListening();
        addSystemMsg('未检测到语音，请再试一次');
        updateStatus('ready', '未检测到语音 — 请靠近麦克风再试');
        updateLiveBadge('Ready');
    }

    function toggleListening() {
        if (isListening) {
            stopListening();
            updateStatus('ready', '就绪 — 请点击麦克风');
        } else {
            startListening();
        }
    }

    // ===== TEXT INPUT (chip clicks) =====
    function askText(text) {
        if (isListening) stopListening();
        if (isSpeaking) stopSpeaking();
        speechQueue = [];

        addBubble(text, 'user');
        var lang = detectLang(text);
        addCallLog(text, lang);
        updateLang(lang);
        updateStatus('ready', '处理中…');
        updateLiveBadge('Thinking');

        if (!callActive) startCallTimer();

        var result = matchAnswer(text);
        setTimeout(function() {
            addBubble(result.answer, 'ai');
            updateStatus('ready', '就绪 — 请点击麦克风');
            updateLiveBadge('Ready');
            if (!isMuted) speakText(result.answer, result.lang);
        }, 400);
    }

    // ===== RESET =====
    function resetDemo() {
        stopListening();
        stopSpeaking();
        speechQueue = [];
        stopCallTimer();
        callSeconds = 0;
        callActive = false;
        callTimerEl.textContent = '00:00';
        transcriptEl.innerHTML = '<div class="bubble ai" id="greetingBubble"></div>';
        callLogEl.innerHTML = '<div class="log-item" style="opacity:0.5;">暂无对话记录</div>';
        updateStatus('ready', '就绪 — 请点击麦克风');
        updateLiveBadge('Ready');
        updateLang('detect');
        currentLang = 'detect';
        currentLangEl.textContent = '—';
    }

    // ===== INIT =====
    function init() {
        // Load voices
        synth.getVoices();
        synth.onvoiceschanged = function() { synth.getVoices(); };

        // Greeting
        var greeting = '您好！欢迎致电 RoseAI。\n我是 AI 智能语音助手，中英文都可以回答。\n\n您想了解什么？价格、功能、POS 对接、还是免费试用？';
        addBubble(greeting, 'ai');

        // Check browser support
        if (!(window.SpeechRecognition || window.webkitSpeechRecognition)) {
            updateStatus('error', '您的浏览器不支持语音识别，请使用 Chrome 打开');
        }
    }

    // Expose to global
    window.toggleListening = toggleListening;
    window.resetDemo = resetDemo;
    window.toggleMute = toggleMute;
    window.askText = askText;

    init();
})();
</script>
